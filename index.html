<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batufuria - Gestión de Encuestas</title>
    <!-- Tailwind CSS para diseño rápido y bonito -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Chart.js para pintar las gráficas de resultados -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

    <!-- Barra de Navegación -->
    <nav class="bg-indigo-600 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wide">🥁 Encuentas</h1>
            <a href="crear.html" class="bg-amber-500 hover:bg-amber-600 text-white px-4 py-2 rounded-lg font-semibold transition shadow">
                + Crear Encuesta
            </a>
        </div>
    </nav>

    <!-- Contenedor Principal -->
    <main class="container mx-auto p-4 max-w-3xl mt-6">
        
        <h2 class="text-2xl font-bold mb-6 text-center text-indigo-900">Encuestas Activas</h2>
        
        <!-- Estado de carga -->
        <div id="loading" class="text-center py-8 text-gray-500 font-medium">
            🥁 Cargando encuestas de la batucada...
        </div>

        <!-- Aquí JavaScript inyectará las encuestas dinámicamente -->
        <div id="lista-encuestas" class="space-y-6 hidden"></div>
 <!-- Sección del Calendario de la Batucada -->
        <section class="container mx-auto p-4 max-w-3xl mt-10 mb-10">
            <div class="bg-white p-6 rounded-xl shadow-md border border-gray-100">
                <h2 class="text-2xl font-bold mb-4 text-center text-indigo-900">📅 Ensayos y Eventos</h2>
                
                <!-- Contenedor responsive para el calendario -->
                <div class="w-full overflow-hidden rounded-lg aspect-video min-h-[400px]">
                    <!-- PEGA TU IFRAME DE GOOGLE CALENDAR AQUÍ ABAJO, reemplazando este -->
                    <iframe src="https://calendar.google.com/calendar/embed?height=200&wkst=2&ctz=Europe%2FMadrid&showPrint=0&title=BATUF%C3%9ARIA&src=Y2VjaWxpYWFsYXJjb25kQGhvdG1haWwuY29t&color=%23039be5" style="border:solid 1px #777" width="400" height="200" frameborder="0" scrolling="no"></iframe>
                </div>
            </div>
        </section>
    </main>

    <!-- Vinculamos nuestra lógica de JS -->
    <script src="app.js"></script>
</body>
</html>
