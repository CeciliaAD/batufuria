<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batufuria - Gestión de Encuestas</title>
    <!-- Tailwind CSS para diseño rápido y bonito -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Chart.js para pintar las gráficas de resultados -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

    <!-- Barra de Navegación -->
    <nav class="bg-indigo-600 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wide">🥁 Encuentas</h1>
            <a href="crear.html" class="bg-amber-500 hover:bg-amber-600 text-white px-4 py-2 rounded-lg font-semibold transition shadow">
                + Crear Encuesta
            </a>
        </div>
    </nav>

    <!-- Contenedor Principal -->
    <main class="container mx-auto p-4 max-w-3xl mt-6">
        
        <h2 class="text-2xl font-bold mb-6 text-center text-indigo-900">Encuestas Activas</h2>
        
        <!-- Estado de carga -->
        <div id="loading" class="text-center py-8 text-gray-500 font-medium">
            🥁 Cargando encuestas de la batucada...
        </div>

        <!-- Aquí JavaScript inyectará las encuestas dinámicamente -->
        <div id="lista-encuestas" class="space-y-6 hidden"></div>
 <!-- Sección del Calendario de la Batucada -->
       <!-- Sección del Calendario de la Batucada -->
        <section class="container mx-auto p-4 max-w-3xl mt-6 mb-10">
            <div class="bg-white p-4 md:p-6 rounded-xl shadow-md border border-gray-100">
                <h2 class="text-xl md:text-2xl font-bold mb-4 text-center text-indigo-900">📅 Ensayos y Eventos</h2>
                
                <!-- Contenedor para el calendario en vista mensual -->
                <div class="w-full rounded-lg border border-gray-200 overflow-hidden shadow-inner bg-gray-50">
                    
                    <!-- REEMPLAZA TU_URL_PÚBLICA_DE_GOOGLE_CALENDAR_AQUÍ manteniendo el final -->
                    <!-- fíjate que ahora pone &mode=MONTH&wkst=2&hl=es -->
                    <iframe src="https://calendar.google.com/calendar/embed?src=8ecc47b67cab1dd5e411e6bd29dd2c8c287011fef7259547463f0970acb8154d%40group.calendar.google.com&ctz=Europe%2FMadrid&mode=MONTH&wkst=2&hl=es" 
                            style="border: 0" 
                            class="w-full h-[500px]" 
                            frameborder="0" 
                            scrolling="no">
                    </iframe>
                    
                </div>
                
                <!-- Botón de apoyo vital para que en el móvil lo puedan abrir en grande si se corta -->
                <div class="mt-4 text-center">
                    <a href="https://calendar.google.com/calendar/embed?src=8ecc47b67cab1dd5e411e6bd29dd2c8c287011fef7259547463f0970acb8154d%40group.calendar.google.com&ctz=Europe%2FMadrid&mode=MONTH&wkst=2&hl=es" target="_blank" 
                    class="inline-block bg-indigo-50 hover:bg-indigo-100 text-indigo-700 text-xs font-semibold px-4 py-2 rounded-lg transition border border-indigo-100">
                        🔍 Ver calendario en pantalla completa / Ampliar
                    </a>
                </div>
            </div>
        </section>
    </main>

    <!-- Vinculamos nuestra lógica de JS -->
    <script src="app.js"></script>
</body>
</html>
