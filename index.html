<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batufuria - Gestión de Encuestas</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

    <!-- Barra de Navegación -->
    <nav class="bg-indigo-600 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wide">🥁 Batufuria - Encuestas</h1>
            <a href="crear.html" class="bg-amber-500 hover:bg-amber-600 text-white px-4 py-2 rounded-lg font-semibold transition shadow">
                + Crear Encuesta
            </a>
        </div>
    </nav>

    <!-- Contenedor Principal -->
    <main class="container mx-auto p-4 max-w-3xl mt-6">
        
        <h2 class="text-2xl font-bold mb-6 text-center text-indigo-900">Votaciones y Ensayos</h2>
        
        <!-- Estado de carga mientras conecta con Google Sheets -->
        <div id="loading" class="text-center py-8 text-gray-500 font-medium animate-pulse">
            鼓 Cargando encuestas de la batucada...
        </div>

        <!-- Aquí app.js inyectará las encuestas, nombres, botones de cerrar y gráficos dinámicamente -->
        <div id="lista-encuestas" class="space-y-6 hidden mb-10"></div>

        <!-- EL BOTÓN MÁGICO PUESTO JUSTO AQUÍ ARRIBA DE LA SECCIÓN -->
        <div class="mb-4 text-center">
            <a href="https://calendar.google.com/calendar/render?action=TEMPLATE&add=8ecc47b67cab1dd5e411e6bd29dd2c8c287011fef7259547463f0970acb8154d@group.calendar.google.com&text=Ensayo+Batufuria" 
               target="_blank" 
               class="w-full sm:w-auto inline-flex items-center justify-center gap-2 bg-green-600 hover:bg-green-700 text-white font-bold px-5 py-2.5 rounded-xl transition shadow transform hover:scale-102 cursor-pointer text-sm">
                ➕ Añadir Evento al Calendario
            </a>
        </div>
        <!-- Sección del Calendario de la Batucada Inteligente -->
        <section class="mt-6 mb-10">
            <div class="bg-white p-4 md:p-6 rounded-xl shadow-md border border-gray-100">
                <h2 class="text-xl md:text-2xl font-bold mb-4 text-center text-indigo-900">📅 Ensayos y Eventos</h2>
                
                <!-- Contenedor adaptable para el calendario -->
                <div class="w-full rounded-lg border border-gray-200 overflow-hidden shadow-inner bg-gray-50">
                    
                    <!-- VISTA MÓVIL (md:hidden): Se activa solo en móviles y carga en modo AGENDA (Lista vertical para que no se corte) -->
                    <iframe src="https://calendar.google.com/calendar/embed?src=8ecc47b67cab1dd5e411e6bd29dd2c8c287011fef7259547463f0970acb8154d%40group.calendar.google.com&ctz=Europe%2FMadrid&mode=AGENDA&wkst=2&hl=es" 
                            style="border: 0" 
                            class="w-full h-[450px] md:hidden" 
                            frameborder="0" 
                            scrolling="yes">
                    </iframe>

                    <!-- VISTA ORDENADOR (hidden md:block): Se activa en pantallas grandes y muestra el MES completo -->
                    <iframe src="https://calendar.google.com/calendar/embed?src=8ecc47b67cab1dd5e411e6bd29dd2c8c287011fef7259547463f0970acb8154d%40group.calendar.google.com&ctz=Europe%2FMadrid&mode=MONTH&wkst=2&hl=es" 
                            style="border: 0" 
                            class="w-full h-[550px] hidden md:block" 
                            frameborder="0" 
                            scrolling="no">
                    </iframe>
                    
                </div>
                
                <!-- Botón de apoyo por si alguna prefiere abrirlo directamente en la aplicación de su móvil -->
                <div class="mt-4 text-center">
                    <a href="https://calendar.google.com/calendar/embed?src=8ecc47b67cab1dd5e411e6bd29dd2c8c287011fef7259547463f0970acb8154d%40group.calendar.google.com&ctz=Europe%2FMadrid&mode=MONTH&wkst=2&hl=es" target="_blank" 
                       class="inline-block bg-indigo-50 hover:bg-indigo-100 text-indigo-700 text-xs font-semibold px-4 py-2 rounded-lg transition border border-indigo-100">
                        🔍 Ver calendario en pantalla completa / Ampliar
                    </a>
                </div>
            </div>
        </section>
    </main>

    <!-- Vinculamos nuestra lógica de JS -->
    <script src="app.js"></script>
</body>
</html>
