<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batufuria - Crear Encuesta</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

    <!-- Barra de Navegación -->
    <nav class="bg-indigo-600 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wide">🥁 Nueva Encuesta</h1>
            <a href="index.html" class="bg-indigo-700 hover:bg-indigo-800 text-white px-4 py-2 rounded-lg font-semibold transition text-sm">
                Volver al Inicio
            </a>
        </div>
    </nav>

    <!-- Contenedor Formulario -->
    <main class="container mx-auto p-4 max-w-xl mt-6">
        <div class="bg-white p-6 rounded-xl shadow-md border border-gray-100">
            
            <label class="block text-sm font-bold text-gray-700 mb-2">1. Selecciona el tipo de encuesta:</label>
            <!-- BOTONES DE TIPO DE ENCUESTA -->
            <div class="grid grid-cols-2 gap-3 mb-6">
                <button type="button" id="btn-tipo-ensayo" onclick="cambiarTipo('ensayo')"
                        class="p-3 rounded-xl border-2 border-indigo-600 bg-indigo-50 text-indigo-900 font-bold text-center cursor-pointer transition">
                    📅 Tipo Ensayo<br><span class="text-xs font-normal text-indigo-600">Opciones automáticas</span>
                </button>
                <button type="button" id="btn-tipo-libre" onclick="cambiarTipo('libre')"
                        class="p-3 rounded-xl border-2 border-gray-200 bg-white text-gray-700 font-semibold text-center cursor-pointer transition hover:border-gray-300">
                    ✏️ Encuesta Libre<br><span class="text-xs font-normal text-gray-400">Opciones personalizadas</span>
                </button>
            </div>

            <!-- FORMULARIO -->
            <form id="form-crear" class="space-y-4">
                
                <div>
                    <label for="titulo" class="block text-sm font-semibold text-gray-700 mb-1">Título de la encuesta</label>
                    <input type="text" id="titulo" required placeholder="Ej: Ensayo Sábado 14 o Próximo Bolo" 
                           class="w-full p-3 rounded-lg border border-gray-200 focus:outline-none focus:border-indigo-500">
                </div>

                <div>
                    <label for="pregunta" class="block text-sm font-semibold text-gray-700 mb-1">Pregunta / Descripción</label>
                    <input type="text" id="pregunta" required placeholder="Ej: ¿Quién se viene a darlo todo?" 
                           class="w-full p-3 rounded-lg border border-gray-200 focus:outline-none focus:border-indigo-500">
                </div>

                <div>
                    <label for="opciones" class="block text-sm font-semibold text-gray-700 mb-1">Opciones de respuesta</label>
                    <!-- El campo empieza configurado como "ensayo" por defecto -->
                    <input type="text" id="opciones" required readonly
                           value="Sí, soy caja, Sí soy repique, Sí soy dobra, Sí soy surdo 1, Sí soy surdo 2, No puedo ❌" 
                           class="w-full p-3 rounded-lg border border-gray-200 bg-gray-50 text-gray-500 cursor-not-allowed">
                    <p id="ayuda-opciones" class="text-xs text-gray-400 mt-1">Las opciones se han rellenado automáticamente para el ensayo.</p>
                </div>

                <div id="mensaje-exito" class="hidden p-3 bg-green-100 text-green-800 text-sm font-semibold rounded-lg text-center animate-bounce">
                    🎉 ¡Encuesta publicada con éxito! Redirigiendo...
                </div>

                <button type="submit" id="btn-enviar" 
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold p-3 rounded-lg transition shadow cursor-pointer mt-2">
                    Publicar Encuesta
                </button>
            </form>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
